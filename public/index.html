<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senda - Facturación</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-8">
    <div class="max-w-2xl mx-auto bg-slate-800 p-8 rounded-xl shadow-xl border border-slate-700">
        <h1 class="text-2xl font-bold text-blue-400 mb-6">Nueva Factura</h1>
        <form id="invoiceForm" class="space-y-4">
            <input type="email" id="customerEmail" placeholder="Email del Cliente" required class="w-full bg-slate-700 p-2 rounded text-slate-100">
            <input type="text" id="customerRfc" placeholder="RFC del Cliente" required class="w-full bg-slate-700 p-2 rounded text-slate-100">
            <input type="text" id="razon_social" placeholder="Razón Social" required class="w-full bg-slate-700 p-2 rounded text-slate-100">
            <input type="text" id="regimen_fiscal" placeholder="Régimen Fiscal" required class="w-full bg-slate-700 p-2 rounded text-slate-100">
            <input type="text" id="uso_cfdi" placeholder="Uso CFDI" required class="w-full bg-slate-700 p-2 rounded text-slate-100">
            <input type="text" id="codigo_postal" placeholder="Código Postal" required class="w-full bg-slate-700 p-2 rounded text-slate-100">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-2 rounded font-bold">Generar Factura</button>
        </form>
        <div id="statusMessage" class="mt-4 text-center font-medium"></div>
    </div>

    <script>
        document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusMessage = document.getElementById('statusMessage');
            const data = {
                customerEmail: document.getElementById('customerEmail').value,
                customerRfc: document.getElementById('customerRfc').value,
                razon_social: document.getElementById('razon_social').value,
                regimen_fiscal: document.getElementById('regimen_fiscal').value,
                uso_cfdi: document.getElementById('uso_cfdi').value,
                codigo_postal: document.getElementById('codigo_postal').value
            };

            try {
                const res = await fetch('/api/customers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if(res.ok) {
                    statusMessage.className = "mt-4 text-center text-green-400";
                    statusMessage.innerText = '¡Factura guardada correctamente!';
                    document.getElementById('invoiceForm').reset();
                } else {
                    throw new Error(result.error || 'Error al guardar');
                }
            } catch (err) {
                statusMessage.className = "mt-4 text-center text-red-400";
                statusMessage.innerText = 'Error: ' + err.message;
            }
        });
    </script>
</body>
</html>
